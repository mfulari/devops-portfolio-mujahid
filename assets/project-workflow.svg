<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" width="960" height="420">
  <defs>
    <linearGradient id="wfBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e8eef5"/>
    </linearGradient>
    <filter id="wfShadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <marker id="wfArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="url(#wfBg)"/>

  <text x="480" y="38" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="22" font-weight="700" fill="#0f172a">
    Project workflow (CI/CD)
  </text>
  <text x="480" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">
    What happens when you push code to the main branch
  </text>

  <!-- Trigger -->
  <g filter="url(#wfShadow)">
    <rect x="32" y="100" width="140" height="88" rx="10" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <text x="102" y="132" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#0f172a">Trigger</text>
    <text x="102" y="156" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#334155">Push to</text>
    <text x="102" y="174" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#0f172a">main</text>
  </g>

  <!-- Step 1 -->
  <g filter="url(#wfShadow)">
    <rect x="200" y="100" width="118" height="88" rx="10" fill="#eff6ff" stroke="#3b82f6"/>
    <text x="259" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1e40af">1 � Checkout</text>
    <text x="259" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1d4ed8">Clone repo</text>
    <text x="259" y="166" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1d4ed8">Full history</text>
    <text x="259" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">(SonarQube)</text>
  </g>

  <!-- Step 2 -->
  <g filter="url(#wfShadow)">
    <rect x="346" y="100" width="118" height="88" rx="10" fill="#fef3c7" stroke="#d97706"/>
    <text x="405" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#92400e">2 � SonarQube</text>
    <text x="405" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Scan JS sources</text>
    <text x="405" y="166" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Quality &amp; security</text>
    <text x="405" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Token + project</text>
  </g>

  <!-- Step 3 -->
  <g filter="url(#wfShadow)">
    <rect x="492" y="100" width="138" height="88" rx="10" fill="#ecfdf5" stroke="#059669"/>
    <text x="561" y="126" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#065f46">3 � Docker build</text>
    <text x="561" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#047857">patient-service</text>
    <text x="561" y="164" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#047857">appointment-service</text>
    <text x="561" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Tag: git SHA</text>
  </g>

  <!-- Step 4 -->
  <g filter="url(#wfShadow)">
    <rect x="658" y="100" width="128" height="88" rx="10" fill="#faf5ff" stroke="#9333ea"/>
    <text x="722" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#6b21a8">4 � Push images</text>
    <text x="722" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7e22ce">GHCR or</text>
    <text x="722" y="166" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7e22ce">Docker Hub</text>
    <text x="722" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Immutable tags</text>
  </g>

  <!-- Step 5 -->
  <g filter="url(#wfShadow)">
    <rect x="814" y="100" width="114" height="88" rx="10" fill="#fff7ed" stroke="#ea580c"/>
    <text x="871" y="126" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#9a3412">5 � Deploy</text>
    <text x="871" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#c2410c">kubectl apply</text>
    <text x="871" y="164" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#c2410c">K8s manifests</text>
    <text x="871" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Rollout wait</text>
  </g>

  <!-- Arrows between steps -->
  <line x1="172" y1="144" x2="200" y2="144" stroke="#334155" stroke-width="1.5" marker-end="url(#wfArrow)"/>
  <line x1="318" y1="144" x2="346" y2="144" stroke="#334155" stroke-width="1.5" marker-end="url(#wfArrow)"/>
  <line x1="464" y1="144" x2="492" y2="144" stroke="#334155" stroke-width="1.5" marker-end="url(#wfArrow)"/>
  <line x1="630" y1="144" x2="658" y2="144" stroke="#334155" stroke-width="1.5" marker-end="url(#wfArrow)"/>
  <line x1="786" y1="144" x2="814" y2="144" stroke="#334155" stroke-width="1.5" marker-end="url(#wfArrow)"/>

  <!-- Outcome box -->
  <g filter="url(#wfShadow)">
    <rect x="120" y="240" width="720" height="100" rx="12" fill="#ffffff" stroke="#94a3b8"/>
    <text x="480" y="272" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0f172a">Outcome</text>
    <text x="480" y="298" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#334155">
      Automated deployment � same pipeline every push � cluster runs images that match the commit
    </text>
    <text x="480" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">
      Secrets (examples): SonarQube token &amp; project � registry login � kubeconfig for the target cluster
    </text>
  </g>

  <!-- Arrow trigger to pipeline label -->
  <text x="480" y="92" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#475569">GitHub Actions runs this sequence</text>
</svg>
