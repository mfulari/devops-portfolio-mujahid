name: Build, scan, and deploy to EKS

on:
  push:
    branches: [main]
    paths:
      - "microservices-eks/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write # required for AWS OIDC
  contents: read
  packages: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || 'hack-microservices-eks' }}
  ECR_NAMESPACE: ${{ vars.ECR_NAMESPACE || 'hack-microservices' }}
  K8S_NAMESPACE: microservices

jobs:
  build-scan-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- Static analysis (skipped automatically if SONAR_TOKEN not set) ---
      - name: Check Sonar config
        id: sonar_cfg
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "${SONAR_TOKEN:-}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: SonarQube Scan
        if: steps.sonar_cfg.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: microservices-eks
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}

      # --- Auth to AWS via OIDC (no static keys) ----------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image coordinates
        run: |
          registry="${{ steps.ecr-login.outputs.registry }}"
          echo "REGISTRY=${registry}/${ECR_NAMESPACE}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${GITHUB_SHA::12}" >> "$GITHUB_ENV"

      # --- Build & push images ---------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push patient-service
        uses: docker/build-push-action@v6
        with:
          context: ./microservices-eks/patient-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/patient-service:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/patient-service:latest
          cache-from: type=gha,scope=patient-service
          cache-to: type=gha,scope=patient-service,mode=max

      - name: Build and push appointment-service
        uses: docker/build-push-action@v6
        with:
          context: ./microservices-eks/appointment-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/appointment-service:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/appointment-service:latest
          cache-from: type=gha,scope=appointment-service
          cache-to: type=gha,scope=appointment-service,mode=max

      # --- Deploy to EKS ----------------------------------------------------
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name "${EKS_CLUSTER_NAME}" \
            --region "${AWS_REGION}"

      - name: Deploy manifests
        working-directory: microservices-eks
        run: |
          set -euo pipefail
          kubectl apply -f k8s/namespace.yaml
          export REGISTRY="${REGISTRY}"
          export IMAGE_TAG="${IMAGE_TAG}"
          envsubst '$REGISTRY $IMAGE_TAG' < k8s/patient-deployment.yaml     | kubectl apply -f -
          envsubst '$REGISTRY $IMAGE_TAG' < k8s/appointment-deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/patient-service.yaml
          kubectl apply -f k8s/appointment-service.yaml
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/patient-service     --timeout=180s
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/appointment-service --timeout=180s

      - name: Show service endpoints
        run: |
          echo "== Services =="
          kubectl -n "${K8S_NAMESPACE}" get svc -o wide
          echo "== Pods =="
          kubectl -n "${K8S_NAMESPACE}" get pods -o wide
