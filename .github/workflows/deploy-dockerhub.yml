name: Build, scan, and deploy (Docker Hub)

on:
  push:
    branches: [main]
    paths:
      - "microservices-eks/**"
      - ".github/workflows/deploy-dockerhub.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  K8S_NAMESPACE: microservices

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- Static analysis (skipped if SONAR_TOKEN not set) ------------------
      - name: Check Sonar config
        id: sonar_cfg
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "${SONAR_TOKEN:-}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: SonarQube Scan
        if: steps.sonar_cfg.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: microservices-eks
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}

      # --- Docker Hub auth ---------------------------------------------------
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image coordinates
        run: |
          echo "REGISTRY=${{ secrets.DOCKERHUB_USERNAME }}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${GITHUB_SHA::12}" >> "$GITHUB_ENV"

      # --- Build & push images -----------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push patient-service
        uses: docker/build-push-action@v6
        with:
          context: ./microservices-eks/patient-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/patient-service:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/patient-service:latest
          cache-from: type=gha,scope=patient-service
          cache-to: type=gha,scope=patient-service,mode=max

      - name: Build and push appointment-service
        uses: docker/build-push-action@v6
        with:
          context: ./microservices-eks/appointment-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/appointment-service:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/appointment-service:latest
          cache-from: type=gha,scope=appointment-service
          cache-to: type=gha,scope=appointment-service,mode=max

      # --- Deploy to Kubernetes ----------------------------------------------
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          if [ -z "${{ secrets.KUBE_CONFIG }}" ]; then
            echo "::error::KUBE_CONFIG secret is not set. Add a base64-encoded kubeconfig."
            exit 1
          fi
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Deploy manifests
        working-directory: microservices-eks
        run: |
          set -euo pipefail
          kubectl apply -f k8s/namespace.yaml
          export REGISTRY="${REGISTRY}"
          export IMAGE_TAG="${IMAGE_TAG}"
          envsubst '$REGISTRY $IMAGE_TAG' < k8s/patient-deployment.yaml     | kubectl apply -f -
          envsubst '$REGISTRY $IMAGE_TAG' < k8s/appointment-deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/patient-service.yaml
          kubectl apply -f k8s/appointment-service.yaml
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/patient-service     --timeout=180s
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/appointment-service --timeout=180s

      - name: Show service endpoints
        run: |
          echo "== Services =="
          kubectl -n "${K8S_NAMESPACE}" get svc -o wide
          echo "== Pods =="
          kubectl -n "${K8S_NAMESPACE}" get pods -o wide
