name: Build and publish (Docker Hub)

on:
  push:
    branches: [main]
    paths:
      - "microservices-eks/**"
      - ".github/workflows/deploy-dockerhub.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  K8S_NAMESPACE: microservices

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      has_dockerhub: ${{ steps.check.outputs.has_dockerhub }}
      has_kubeconfig: ${{ steps.check.outputs.has_kubeconfig }}
      has_sonar: ${{ steps.check.outputs.has_sonar }}
    steps:
      - id: check
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${DOCKERHUB_USERNAME:-}" ] && [ -n "${DOCKERHUB_TOKEN:-}" ]; then
            echo "has_dockerhub=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::DOCKERHUB_USERNAME/DOCKERHUB_TOKEN not set; build will be skipped."
            echo "has_dockerhub=false" >> "$GITHUB_OUTPUT"
          fi
          [ -n "${KUBE_CONFIG:-}" ] && echo "has_kubeconfig=true" >> "$GITHUB_OUTPUT" || echo "has_kubeconfig=false" >> "$GITHUB_OUTPUT"
          [ -n "${SONAR_TOKEN:-}" ]  && echo "has_sonar=true"      >> "$GITHUB_OUTPUT" || echo "has_sonar=false"      >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: preflight
    if: needs.preflight.outputs.has_dockerhub == 'true'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
      registry: ${{ steps.vars.outputs.registry }}
    steps:
      - uses: actions/checkout@v4

      - name: SonarQube scan
        if: needs.preflight.outputs.has_sonar == 'true'
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: microservices-eks
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: vars
        run: |
          echo "registry=${{ secrets.DOCKERHUB_USERNAME }}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build and push patient-service
        uses: docker/build-push-action@v6
        with:
          context: ./microservices-eks/patient-service
          push: true
          tags: |
            ${{ steps.vars.outputs.registry }}/patient-service:${{ steps.vars.outputs.image_tag }}
            ${{ steps.vars.outputs.registry }}/patient-service:latest
          cache-from: type=gha,scope=patient-service
          cache-to: type=gha,scope=patient-service,mode=max

      - name: Build and push appointment-service
        uses: docker/build-push-action@v6
        with:
          context: ./microservices-eks/appointment-service
          push: true
          tags: |
            ${{ steps.vars.outputs.registry }}/appointment-service:${{ steps.vars.outputs.image_tag }}
            ${{ steps.vars.outputs.registry }}/appointment-service:latest
          cache-from: type=gha,scope=appointment-service
          cache-to: type=gha,scope=appointment-service,mode=max

  deploy:
    needs: [preflight, build-and-push]
    if: needs.preflight.outputs.has_kubeconfig == 'true'
    runs-on: ubuntu-latest
    env:
      REGISTRY: ${{ needs.build-and-push.outputs.registry }}
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Configure kubeconfig
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Apply manifests
        working-directory: microservices-eks
        run: |
          set -euo pipefail
          kubectl apply -f k8s/namespace.yaml
          envsubst '$REGISTRY $IMAGE_TAG' < k8s/patient-deployment.yaml     | kubectl apply -f -
          envsubst '$REGISTRY $IMAGE_TAG' < k8s/appointment-deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/patient-service.yaml
          kubectl apply -f k8s/appointment-service.yaml
          kubectl -n "$K8S_NAMESPACE" rollout status deployment/patient-service     --timeout=180s
          kubectl -n "$K8S_NAMESPACE" rollout status deployment/appointment-service --timeout=180s

      - name: Show endpoints
        run: |
          kubectl -n "$K8S_NAMESPACE" get svc,pods -o wide
