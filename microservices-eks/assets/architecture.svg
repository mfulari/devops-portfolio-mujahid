<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" width="920" height="520">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)"/>

  <text x="460" y="36" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="20" font-weight="600" fill="#0f172a">
    Microservices — architecture
  </text>
  <text x="460" y="58" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="12" fill="#64748b">
    Patient Service &amp; Appointment Service · CI/CD · Kubernetes
  </text>

  <!-- Developer / Git -->
  <g filter="url(#shadow)">
    <rect x="40" y="100" width="120" height="72" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="100" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Developer</text>
    <text x="100" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">git push → main</text>
  </g>

  <!-- GitHub Actions -->
  <g filter="url(#shadow)">
    <rect x="220" y="88" width="280" height="96" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="360" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e293b">GitHub Actions</text>
    <rect x="236" y="122" width="72" height="52" rx="4" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="272" y="144" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1d4ed8">Checkout</text>
    <text x="272" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1d4ed8">SonarQube</text>
    <rect x="316" y="122" width="88" height="52" rx="4" fill="#f0fdf4" stroke="#86efac"/>
    <text x="360" y="144" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Docker build</text>
    <text x="360" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">(2 images)</text>
    <rect x="412" y="122" width="76" height="52" rx="4" fill="#faf5ff" stroke="#d8b4fe"/>
    <text x="450" y="144" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7e22ce">Push to</text>
    <text x="450" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7e22ce">registry</text>
  </g>

  <!-- Registry -->
  <g filter="url(#shadow)">
    <rect x="560" y="100" width="140" height="72" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="630" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Container registry</text>
    <text x="630" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">GHCR / Docker Hub</text>
  </g>

  <!-- kubectl -->
  <g filter="url(#shadow)">
    <rect x="760" y="100" width="120" height="72" rx="8" fill="#fff7ed" stroke="#fdba74"/>
    <text x="820" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#9a3412">kubectl apply</text>
    <text x="820" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#c2410c">manifests</text>
  </g>

  <!-- Arrows top row -->
  <line x1="160" y1="136" x2="220" y2="136" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="136" x2="560" y2="136" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="700" y1="136" x2="760" y2="136" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Kubernetes cluster box -->
  <g filter="url(#shadow)">
    <rect x="40" y="220" width="840" height="260" rx="12" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="460" y="248" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0f172a">Kubernetes cluster</text>
    <text x="460" y="266" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Minikube · AKS · or other</text>

    <!-- Namespace -->
    <rect x="64" y="286" width="792" height="174" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="88" y="308" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#334155">Namespace: microservices</text>

    <!-- Patient -->
    <rect x="88" y="324" width="340" height="120" rx="8" fill="#ffffff" stroke="#3b82f6"/>
    <text x="258" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e40af">Patient Service</text>
    <rect x="104" y="358" width="100" height="72" rx="6" fill="#dbeafe" stroke="#60a5fa"/>
    <text x="154" y="382" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">Deployment</text>
    <text x="154" y="398" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#1e40af">replicas, probes</text>
    <rect x="216" y="358" width="100" height="72" rx="6" fill="#dbeafe" stroke="#60a5fa"/>
    <text x="266" y="382" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">Service</text>
    <text x="266" y="398" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#1e40af">ClusterIP :3000</text>
    <rect x="328" y="358" width="84" height="72" rx="6" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="370" y="382" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1e40af">Pod</text>
    <text x="370" y="398" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#2563eb">Express</text>
    <text x="370" y="412" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#2563eb">/patients</text>

    <!-- Appointment -->
    <rect x="452" y="324" width="388" height="120" rx="8" fill="#ffffff" stroke="#059669"/>
    <text x="646" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#065f46">Appointment Service</text>
    <rect x="468" y="358" width="100" height="72" rx="6" fill="#d1fae5" stroke="#34d399"/>
    <text x="518" y="382" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#064e3b">Deployment</text>
    <text x="518" y="398" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">replicas, probes</text>
    <rect x="580" y="358" width="100" height="72" rx="6" fill="#d1fae5" stroke="#34d399"/>
    <text x="630" y="382" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#064e3b">Service</text>
    <text x="630" y="398" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">ClusterIP :3001</text>
    <rect x="692" y="358" width="132" height="72" rx="6" fill="#ecfdf5" stroke="#6ee7b7"/>
    <text x="758" y="382" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#047857">Pod</text>
    <text x="758" y="398" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#059669">Express</text>
    <text x="758" y="412" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#059669">/appointments</text>
  </g>

  <!-- Arrow from kubectl to cluster -->
  <line x1="820" y1="172" x2="820" y2="210" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="820" y1="210" x2="460" y2="210" stroke="#475569" stroke-width="1.5"/>
  <line x1="460" y1="210" x2="460" y2="220" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <text x="40" y="502" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">
    In-memory data per service · no shared DB in sample · Ingress/LB optional for external access
  </text>
</svg>
