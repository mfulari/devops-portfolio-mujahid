services:
  patient-service:
    build: ./patient-service
    image: patient-service:local
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  appointment-service:
    build: ./appointment-service
    image: appointment-service:local
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 3s
      retries: 5
